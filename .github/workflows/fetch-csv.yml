name: Fetch 50 coins CSV

on:
  workflow_dispatch:  # ম্যানুয়াল রান করবে
  schedule:
    - cron: '0 2 * * *'  # প্রতি রাত ২ টায় অটো (ঐচ্ছিক)

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install requests pandas

      - name: Fetch all 30-day 15m CSV
        run: |
          python -c "
import os, requests, pandas as pd, time
os.makedirs('data', exist_ok=True)
coins = '''BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT,DOGEUSDT,MATICUSDT,DOTUSDT,LTCUSDT,BCHUSDT,AVAXUSDT,UNIUSDT,LINKUSDT,ATOMUSDT,ETCUSDT,FILUSDT,ICPUSDT,NEARUSDT,APTUSDT,SANDUSDT,AXSUSDT,THETAUSDT,FTMUSDT,RUNEUSDT,ALGOUSDT,EGLDUSDT,IMXUSDT,INJUSDT,OPUSDT,ARBUSDT,SUIUSDT,TIAUSDT,PEPEUSDT,TRBUSDT,SEIUSDT,JTOUSDT,PYTHUSDT,RAYUSDT,GMTUSDT,MINAUSDT,WLDUSDT,ZKUSDT,STRKUSDT,DYDXUSDT,VETUSDT,GALAUSDT,KAVAUSDT,FETUSDT,RNDRUSDT,ARUSDT,AAVEUSDT'''.split(',')
for c in coins:
    url = f'https://api.binance.com/api/v3/klines?symbol={c}&interval=15m&limit=2000'
    data = requests.get(url, timeout=20).json()
    if not data: continue
    df = pd.DataFrame(data, columns=['ot','o','h','l','c','v','ct','qv','trades','tb','tq','i'])
    df['ot'] = pd.to_datetime(df['ot'], unit='ms')
    df[['o','h','l','c']] = df[['o','h','l','c']].astype(float)
    df[['ot','o','h','l','c']].to_csv(f'data/{c.lower()}_15m_30d.csv', index=False)
    print('✅', c)
          "

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add 50 coins 30d 15m CSV" && git push)
