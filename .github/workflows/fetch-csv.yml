name: fetch-csv

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests pandas
      - run: |
          python -c "
import os,requests,pandas as pd
os.makedirs('data',exist_ok=True)
for c in 'BTCUSDT,ETHUSDT,SOLUSDT'.split(','):
    d=requests.get(f'https://api.binance.com/api/v3/klines?symbol={c}&interval=15m&limit=2000',timeout=15).json()
    df=pd.DataFrame(d,columns='ot o h l c v ct qv trades tb tq i'.split())[['ot','o','h','l','c']]
    df['ot']=pd.to_datetime(df['ot'],unit='ms')
    df.to_csv(f'data/{c.lower()}_15m_30d.csv',index=False)
          "
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "add csv" && git push)
