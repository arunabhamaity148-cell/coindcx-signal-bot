name: fetch-csv
on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests pandas
      - run: python fetch_script.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "add csv" && git push)
